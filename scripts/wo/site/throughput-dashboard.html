<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WO Throughput Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
    <style>
      :root {
        --bg: #f6f4ea;
        --bg-accent: #e6f2d8;
        --card: #fffdf8;
        --text: #1f2a35;
        --muted: #6a7682;
        --line: #d9d4c5;
        --success: #1a8f4c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 5% 10%, var(--bg-accent) 0%, transparent 45%),
          radial-gradient(circle at 95% 15%, #f1e4cf 0%, transparent 40%),
          var(--bg);
      }

      .layout {
        max-width: 1100px;
        margin: 0 auto;
        padding: 1.5rem 1rem 2rem;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 1rem;
        box-shadow: 0 10px 35px rgb(30 45 60 / 8%);
      }

      h1 {
        font-family: "Fraunces", "Georgia", serif;
        margin: 0 0 0.4rem;
        letter-spacing: 0.01em;
      }

      p {
        margin: 0;
      }

      .subtle {
        color: var(--muted);
        font-size: 0.95rem;
      }

      .meta {
        margin-top: 0.85rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
      }

      .chip {
        background: #f3f1e9;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0.3rem 0.75rem;
        font-size: 0.85rem;
      }

      button.chip {
        font: inherit;
        line-height: inherit;
      }

      .chip-toggle {
        cursor: pointer;
      }

      .chip-toggle:not(.is-active) {
        opacity: 0.45;
      }

      .status-ok {
        color: var(--success);
      }

      .chart-grid {
        margin-top: 0.8rem;
        display: grid;
        gap: 0.9rem;
        grid-template-columns: 1fr;
      }

      .chart-card {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 0.8rem;
        background: #fffaf0;
      }

      .chart-title {
        margin: 0 0 0.35rem;
        font-size: 0.95rem;
        color: var(--muted);
      }

      .chart-legend {
        display: flex;
        flex-wrap: wrap;
        gap: 0.7rem;
        margin: 0 0 0.55rem;
        color: var(--muted);
        font-size: 0.82rem;
      }

      .chart-legend-item {
        display: inline-flex;
        align-items: center;
        gap: 0.38rem;
      }

      .chart-legend-line {
        display: inline-block;
        width: 22px;
        height: 0;
        border-top: 2px solid #425466;
      }

      .chart-legend-line-actual {
        border-top-width: 2.6px;
      }

      .chart-legend-line-target {
        border-top-style: dotted;
      }

      .chart-legend-line-dashed {
        border-top-style: dashed;
      }

      .chart-legend-swatch {
        width: 0.72rem;
        height: 0.72rem;
        border-radius: 50%;
        display: inline-block;
        box-shadow: inset 0 0 0 1px rgb(31 42 53 / 22%);
      }

      #throughput-chart {
        margin-top: 0.8rem;
        min-height: 420px;
      }

      #cycle-gauge {
        min-height: 280px;
        display: grid;
        place-items: center;
      }

      .cycle-gauge-wrap {
        display: grid;
        place-items: center;
        width: 100%;
        min-height: 250px;
      }

      .cycle-gauge-ring {
        --gauge-size: min(240px, 72vw);
        width: var(--gauge-size);
        height: var(--gauge-size);
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: conic-gradient(var(--gauge-color, #1a8f4c) var(--progress-deg), #e6e0cf var(--progress-deg) 360deg);
        box-shadow: inset 0 0 0 1px #d9d4c5;
      }

      .cycle-gauge-core {
        width: 68%;
        height: 68%;
        border-radius: 50%;
        background: #fffaf0;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 0.6rem;
      }

      .cycle-gauge-value {
        font-weight: 700;
        font-size: 1.45rem;
        line-height: 1.1;
      }

      .cycle-gauge-subtle {
        margin-top: 0.25rem;
        color: var(--muted);
        font-size: 0.82rem;
      }

      #cycle-area {
        min-height: 260px;
      }

      #cycle-area-by-label {
        min-height: 300px;
      }

      #throughput-chart .vega-embed,
      #throughput-chart svg,
      #cycle-area .vega-embed,
      #cycle-area svg,
      #cycle-area-by-label .vega-embed,
      #cycle-area-by-label svg {
        max-width: 100%;
      }

      .error {
        margin-top: 1rem;
        border-radius: 12px;
        border: 1px solid #e7c4c4;
        background: #fff4f2;
        padding: 0.8rem;
        color: #842029;
      }

      @media (max-width: 700px) {
        .layout {
          padding: 1rem 0.75rem 1.5rem;
        }
        h1 {
          font-size: 1.6rem;
        }
      }

      @media (min-width: 960px) {
        .chart-grid {
          grid-template-columns: 1fr 1fr;
        }

        .chart-card-full {
          grid-column: 1 / -1;
        }
      }
    </style>
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <h1>WO Throughput</h1>
        <p class="subtle">Cumulative completed tasks per label (selected time range)</p>
        <div class="meta" id="meta"></div>
        <div class="chart-grid">
          <div class="chart-card chart-card-full">
            <p class="chart-title">Cumulative throughput by label</p>
            <div id="throughput-style-legend" class="chart-legend" aria-label="Throughput chart series legend"></div>
            <div id="throughput-series-legend" class="chart-legend" aria-label="Throughput label colors"></div>
            <div id="throughput-chart"></div>
          </div>
          <div class="chart-card">
            <p class="chart-title">Live cumulative cycle time (unfinished)</p>
            <div id="cycle-gauge"></div>
          </div>
          <div class="chart-card">
            <p class="chart-title">Cycle-time progression snapshots (5m)</p>
            <div id="cycle-area"></div>
          </div>
          <div class="chart-card chart-card-full">
            <p class="chart-title">Cycle-time progression snapshots by label (5m)</p>
            <div id="cycle-area-by-label"></div>
          </div>
        </div>
        <div id="error" class="error" hidden></div>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const dataUrl = params.get("data") || "../state/wo-throughput-chart.json";
      const refreshSecondsRaw = parseInt(params.get("refresh") || "30", 10);
      const refreshSeconds = Number.isFinite(refreshSecondsRaw) && refreshSecondsRaw >= 5 ? refreshSecondsRaw : 30;
      const metaEl = document.getElementById("meta");
      const throughputChartEl = document.getElementById("throughput-chart");
      const throughputStyleLegendEl = document.getElementById("throughput-style-legend");
      const throughputSeriesLegendEl = document.getElementById("throughput-series-legend");
      const cycleGaugeEl = document.getElementById("cycle-gauge");
      const cycleAreaEl = document.getElementById("cycle-area");
      const cycleAreaByLabelEl = document.getElementById("cycle-area-by-label");
      const errorEl = document.getElementById("error");
      let latestData = null;
      let visibleLabels = null;
      const timeRangePresets = [
        { id: "this-week", label: "This week" },
        { id: "today", label: "Today" },
        { id: "last-7d", label: "Last 7d" },
        { id: "this-month", label: "This month" },
        { id: "all", label: "All" },
      ];
      const timeRangePresetIds = new Set(timeRangePresets.map((preset) => preset.id));
      const timeRangeParam = (params.get("range") || "").trim().toLowerCase();
      let selectedTimeRangeId = timeRangePresetIds.has(timeRangeParam) ? timeRangeParam : "this-week";
      const goalEmaWindowDays = 14;
      const goalFallbackShareWindowDays = 90;
      const millisecondsPerDay = 24 * 60 * 60 * 1000;
      const frozenTargetStoragePrefix = "wo-throughput-frozen-target-v1";
      const throughputPalette = [
        "#2f7d46",
        "#b5432a",
        "#2a6f97",
        "#8a5a2b",
        "#7b3fb2",
        "#3e8b8b",
        "#5f6b2f",
        "#a1476d",
      ];

      const formatDateTime = (value) => {
        if (!value) {
          return "--";
        }
        return new Intl.DateTimeFormat(undefined, {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false,
        }).format(new Date(value));
      };

      const formatDateOnly = (value) => {
        if (!value) {
          return "--";
        }
        return new Intl.DateTimeFormat(undefined, {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
        }).format(new Date(value));
      };

      const getStartOfLocalDay = (value) => {
        const date = new Date(value);
        date.setHours(0, 0, 0, 0);
        return date;
      };

      const getStartOfLocalWeekMonday = (value) => {
        const date = getStartOfLocalDay(value);
        const day = (date.getDay() + 6) % 7;
        date.setDate(date.getDate() - day);
        return date;
      };

      const getStartOfLocalMonth = (value) => {
        const date = new Date(value);
        date.setDate(1);
        date.setHours(0, 0, 0, 0);
        return date;
      };

      const toTimeMs = (value) => {
        if (!value) {
          return null;
        }
        const parsed = Date.parse(value);
        return Number.isFinite(parsed) ? parsed : null;
      };

      const getReferenceNow = (data) => {
        const cycle = data && typeof data === "object" ? data.cycleTime : null;
        const nowIso = (cycle && cycle.generatedAt) || (data && data.generatedAt) || new Date().toISOString();
        const nowMs = toTimeMs(nowIso);
        return new Date(nowMs ?? Date.now());
      };

      const getSelectedTimeRange = (data) => {
        const now = getReferenceNow(data);
        const nowMs = now.getTime();

        if (selectedTimeRangeId === "all") {
          return {
            id: "all",
            label: "All",
            startMs: null,
            endMs: null,
          };
        }

        if (selectedTimeRangeId === "today") {
          return {
            id: "today",
            label: "Today",
            startMs: getStartOfLocalDay(now).getTime(),
            endMs: nowMs,
          };
        }

        if (selectedTimeRangeId === "last-7d") {
          return {
            id: "last-7d",
            label: "Last 7d",
            startMs: nowMs - (7 * 24 * 60 * 60 * 1000),
            endMs: nowMs,
          };
        }

        if (selectedTimeRangeId === "this-month") {
          return {
            id: "this-month",
            label: "This month",
            startMs: getStartOfLocalMonth(now).getTime(),
            endMs: nowMs,
          };
        }

        return {
          id: "this-week",
          label: "This week",
          startMs: getStartOfLocalWeekMonday(now).getTime(),
          endMs: nowMs,
        };
      };

      const isWithinTimeRangeMs = (timeMs, range) => {
        if (!Number.isFinite(timeMs)) {
          return false;
        }
        if (range.startMs !== null && timeMs < range.startMs) {
          return false;
        }
        if (range.endMs !== null && timeMs > range.endMs) {
          return false;
        }
        return true;
      };

      const getTimeRangeDomain = (range) => {
        if (range.startMs === null || range.endMs === null) {
          return null;
        }
        return [new Date(range.startMs).toISOString(), new Date(range.endMs).toISOString()];
      };

      const formatSelectedRangeText = (range) => {
        if (range.startMs === null || range.endMs === null) {
          return "All available data";
        }
        return `${formatDateOnly(new Date(range.startMs))} to ${formatDateOnly(new Date(range.endMs))}`;
      };

      const pad2 = (value) => String(value).padStart(2, "0");

      const toLocalDateKey = (value) => {
        const date = new Date(value);
        return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
      };

      const getLocalDateFromKey = (value) => {
        const [yearRaw, monthRaw, dayRaw] = String(value).split("-");
        const year = Number(yearRaw);
        const month = Number(monthRaw);
        const day = Number(dayRaw);
        if (!Number.isFinite(year) || !Number.isFinite(month) || !Number.isFinite(day)) {
          return null;
        }
        return new Date(year, month - 1, day, 0, 0, 0, 0);
      };

      const listLocalDayKeys = (startDate, endDate) => {
        const keys = [];
        const start = getStartOfLocalDay(startDate);
        const end = getStartOfLocalDay(endDate);
        if (start.getTime() > end.getTime()) {
          return keys;
        }
        const cursor = new Date(start);
        while (cursor.getTime() <= end.getTime()) {
          keys.push(toLocalDateKey(cursor));
          cursor.setDate(cursor.getDate() + 1);
        }
        return keys;
      };

      const buildGoalRateContext = (options) => {
        const labels = Array.isArray(options.labels) ? options.labels : [];
        const points = Array.isArray(options.points) ? options.points : [];
        const referenceNow = options.referenceNow instanceof Date ? options.referenceNow : new Date();
        const alpha = 2 / (goalEmaWindowDays + 1);
        const byDayByLabel = new Map();
        const totalByLabel = new Map();
        const globalByDay = new Map();

        for (const label of labels) {
          byDayByLabel.set(label, new Map());
          totalByLabel.set(label, 0);
        }

        let minPointMs = Number.POSITIVE_INFINITY;
        for (const point of points) {
          if (!point || !Number.isFinite(point.atMs)) {
            continue;
          }
          const label = String(point.label);
          if (!byDayByLabel.has(label)) {
            byDayByLabel.set(label, new Map());
            totalByLabel.set(label, 0);
          }
          minPointMs = Math.min(minPointMs, point.atMs);
          const dayKey = toLocalDateKey(new Date(point.atMs));
          const completed = Math.max(0, Number(point.completed) || 0);
          const labelDayMap = byDayByLabel.get(label);
          labelDayMap.set(dayKey, (labelDayMap.get(dayKey) || 0) + completed);
          totalByLabel.set(label, (totalByLabel.get(label) || 0) + completed);
          globalByDay.set(dayKey, (globalByDay.get(dayKey) || 0) + completed);
        }

        const firstDate = Number.isFinite(minPointMs) ? new Date(minPointMs) : referenceNow;
        const dayKeys = listLocalDayKeys(firstDate, referenceNow);
        if (dayKeys.length === 0) {
          dayKeys.push(toLocalDateKey(referenceNow));
        }

        let globalEma = 0;
        for (const dayKey of dayKeys) {
          const value = Math.max(0, Number(globalByDay.get(dayKey) || 0));
          globalEma = alpha * value + (1 - alpha) * globalEma;
        }

        const localNowDayKey = dayKeys[dayKeys.length - 1];
        const localNowDay = getLocalDateFromKey(localNowDayKey) || getStartOfLocalDay(referenceNow);
        const trailingStartDay = new Date(localNowDay);
        trailingStartDay.setDate(trailingStartDay.getDate() - (goalFallbackShareWindowDays - 1));
        const trailingDayKeys = listLocalDayKeys(trailingStartDay, localNowDay);

        const trailingByLabel = new Map();
        let trailingGlobalTotal = 0;
        for (const label of labels) {
          const labelDayMap = byDayByLabel.get(label) || new Map();
          let total = 0;
          for (const dayKey of trailingDayKeys) {
            total += Math.max(0, Number(labelDayMap.get(dayKey) || 0));
          }
          trailingByLabel.set(label, total);
          trailingGlobalTotal += total;
        }

        const bootstrapShare = labels.length > 0 ? (1 / (2 * labels.length)) : 0;
        const sharePriorRaw = new Map();
        let sharePriorRawTotal = 0;
        for (const label of labels) {
          const observedShare = trailingGlobalTotal > 0
            ? (trailingByLabel.get(label) || 0) / trailingGlobalTotal
            : 0;
          const prior = Math.max(observedShare, bootstrapShare);
          sharePriorRaw.set(label, prior);
          sharePriorRawTotal += prior;
        }

        const sharePrior = new Map();
        for (const label of labels) {
          const normalizedShare = sharePriorRawTotal > 0
            ? (sharePriorRaw.get(label) || 0) / sharePriorRawTotal
            : 0;
          sharePrior.set(label, normalizedShare);
        }

        const rateByLabel = new Map();
        const sourceByLabel = new Map();
        for (const label of labels) {
          const labelDayMap = byDayByLabel.get(label) || new Map();
          let labelEma = 0;
          for (const dayKey of dayKeys) {
            const value = Math.max(0, Number(labelDayMap.get(dayKey) || 0));
            labelEma = alpha * value + (1 - alpha) * labelEma;
          }

          const hasOwnHistory = (totalByLabel.get(label) || 0) > 0;
          if (hasOwnHistory) {
            rateByLabel.set(label, labelEma);
            sourceByLabel.set(label, `ema-${goalEmaWindowDays}d`);
            continue;
          }

          if (globalEma > 0 && sharePriorRawTotal > 0) {
            rateByLabel.set(label, globalEma * (sharePrior.get(label) || 0));
            sourceByLabel.set(label, `fallback global ema-${goalEmaWindowDays}d x 90d share`);
            continue;
          }

          if (globalEma > 0) {
            rateByLabel.set(label, globalEma);
            sourceByLabel.set(label, `fallback global ema-${goalEmaWindowDays}d`);
            continue;
          }

          rateByLabel.set(label, 0);
          sourceByLabel.set(label, "fallback flat zero");
        }

        return { rateByLabel, sourceByLabel };
      };

      const getThroughputDomainMs = (range, points, referenceNow) => {
        const referenceMs = referenceNow instanceof Date ? referenceNow.getTime() : Date.now();
        const pointTimes = points
          .map((point) => point && Number(point.atMs))
          .filter((value) => Number.isFinite(value));

        const defaultStart = pointTimes.length > 0 ? Math.min(...pointTimes) : referenceMs;
        const defaultEnd = pointTimes.length > 0 ? Math.max(...pointTimes) : referenceMs;
        const startMs = range.startMs !== null ? range.startMs : defaultStart;
        const endMsRaw = range.endMs !== null ? range.endMs : defaultEnd;
        const endMs = Math.max(startMs, endMsRaw);
        return { startMs, endMs };
      };

      const buildRangeAnchorsMs = (startMs, endMs) => {
        const anchors = [startMs];
        const startDay = getStartOfLocalDay(new Date(startMs));
        const cursor = new Date(startDay);
        if (cursor.getTime() <= startMs) {
          cursor.setDate(cursor.getDate() + 1);
        }
        while (cursor.getTime() < endMs) {
          anchors.push(cursor.getTime());
          cursor.setDate(cursor.getDate() + 1);
        }
        anchors.push(endMs);
        return Array.from(new Set(anchors)).sort((a, b) => a - b);
      };

      const getTargetFreezeStartMs = (range) => {
        if (!range || range.startMs === null) {
          return null;
        }
        if (range.id === "today" || range.id === "this-week" || range.id === "this-month") {
          return range.startMs;
        }
        return null;
      };

      const buildSyntheticSeriesPoints = (options) => {
        const labels = Array.isArray(options.labels) ? options.labels : [];
        const visibleLabelSet = options.visibleLabelSet instanceof Set ? options.visibleLabelSet : new Set();
        const anchorsMs = Array.isArray(options.anchorsMs) ? options.anchorsMs : [];
        const context = options.context && typeof options.context === "object"
          ? options.context
          : { rateByLabel: new Map(), sourceByLabel: new Map() };
        const domainStartMs = Number(options.domainStartMs);
        if (!Number.isFinite(domainStartMs) || anchorsMs.length === 0) {
          return [];
        }

        const points = [];
        for (const label of labels) {
          if (!visibleLabelSet.has(label)) {
            continue;
          }
          const ratePerDay = Math.max(0, Number(context.rateByLabel.get(label) || 0));
          const source = context.sourceByLabel.get(label) || "ema";
          for (const atMs of anchorsMs) {
            const elapsedDays = Math.max(0, (atMs - domainStartMs) / millisecondsPerDay);
            points.push({
              at: new Date(atMs).toISOString(),
              atMs,
              label,
              syntheticCumulative: ratePerDay * elapsedDays,
              syntheticSource: source,
            });
          }
        }
        return points;
      };

      const hasPositiveSyntheticRate = (context, labels) => {
        const rateByLabel = context && context.rateByLabel instanceof Map ? context.rateByLabel : new Map();
        for (const label of labels) {
          if ((Number(rateByLabel.get(label)) || 0) > 0) {
            return true;
          }
        }
        return false;
      };

      const getFrozenTargetStorageKey = (range, labels) => {
        if (!range || range.startMs === null) {
          return null;
        }
        const startKey = toLocalDateKey(new Date(range.startMs));
        const labelsKey = normalizeLabels(labels).join(",");
        return `${frozenTargetStoragePrefix}:${range.id}:${startKey}:${labelsKey}`;
      };

      const loadFrozenTargetContext = (storageKey) => {
        if (!storageKey || typeof window === "undefined" || !window.localStorage) {
          return null;
        }
        try {
          const raw = window.localStorage.getItem(storageKey);
          if (!raw) {
            return null;
          }
          const parsed = JSON.parse(raw);
          const ratesRaw = parsed && typeof parsed === "object" && parsed.rates && typeof parsed.rates === "object"
            ? parsed.rates
            : null;
          if (!ratesRaw) {
            return null;
          }
          const sourcesRaw = parsed && typeof parsed === "object" && parsed.sources && typeof parsed.sources === "object"
            ? parsed.sources
            : {};
          return {
            rateByLabel: new Map(Object.entries(ratesRaw)),
            sourceByLabel: new Map(Object.entries(sourcesRaw)),
          };
        } catch {
          return null;
        }
      };

      const persistFrozenTargetContext = (storageKey, context, labels) => {
        if (!storageKey || typeof window === "undefined" || !window.localStorage) {
          return;
        }
        try {
          const payload = {
            rates: Object.fromEntries(labels.map((label) => [label, Math.max(0, Number(context.rateByLabel.get(label) || 0))])),
            sources: Object.fromEntries(labels.map((label) => [label, String(context.sourceByLabel.get(label) || "ema")])),
          };
          window.localStorage.setItem(storageKey, JSON.stringify(payload));
        } catch {
          // Ignore storage failures (private mode, quota, etc.)
        }
      };

      const normalizeLabels = (labels) => Array.isArray(labels)
        ? labels.map((label) => String(label).trim().toLowerCase()).filter((label) => label.length > 0)
        : [];

      const getLabelColorMap = (labels) => {
        const normalized = normalizeLabels(labels);
        const entries = normalized.map((label, index) => [label, throughputPalette[index % throughputPalette.length]]);
        return new Map(entries);
      };

      const getEffectiveVisibleLabels = (allLabels) => {
        const normalized = normalizeLabels(allLabels);
        if (normalized.length === 0) {
          return new Set();
        }
        if (visibleLabels === null) {
          return new Set(normalized);
        }
        const pruned = new Set(Array.from(visibleLabels).filter((label) => normalized.includes(label)));
        if (pruned.size === 0) {
          return new Set(normalized);
        }
        return pruned;
      };

      const setVisibleLabels = (labelsSet, allLabels) => {
        const normalized = normalizeLabels(allLabels);
        if (normalized.length === 0) {
          visibleLabels = null;
          return;
        }
        if (labelsSet.size >= normalized.length) {
          visibleLabels = null;
          return;
        }
        visibleLabels = new Set(Array.from(labelsSet));
      };

      const formatDuration = (seconds) => {
        const safeSeconds = Math.max(0, Math.floor(Number(seconds) || 0));
        const hours = Math.floor(safeSeconds / 3600);
        const minutes = Math.floor((safeSeconds % 3600) / 60);
        if (hours <= 0) {
          return `${minutes}m`;
        }
        return `${hours}h ${minutes}m`;
      };

      const formatHours = (seconds) => ((Math.max(0, Number(seconds) || 0)) / 3600).toFixed(1);

      const getVisibleCycleCards = (data, range) => {
        const cycle = data && typeof data === "object" ? data.cycleTime : null;
        const cards = cycle && Array.isArray(cycle.cards) ? cycle.cards : [];
        const visibleLabelSet = getEffectiveVisibleLabels(data.labels);
        return cards.filter((card) => {
          const enteredMs = toTimeMs(card.enteredDoingAt);
          if (!isWithinTimeRangeMs(enteredMs, range)) {
            return false;
          }
          if (visibleLabelSet.size === 0) {
            return true;
          }
          const labels = Array.isArray(card.labels) ? card.labels : [];
          return labels.some((label) => visibleLabelSet.has(String(label).trim().toLowerCase()));
        });
      };

      const getVisibleSnapshotCycleSeconds = (data, range) => {
        const cycle = data && typeof data === "object" ? data.cycleTime : null;
        const snapshots = cycle && Array.isArray(cycle.snapshots) ? cycle.snapshots : [];
        const visibleLabelSet = getEffectiveVisibleLabels(data.labels);

        return snapshots.filter((point) => {
          if (!point || !point.at) {
            return false;
          }
          return isWithinTimeRangeMs(toTimeMs(point.at), range);
        }).map((point) => {
          if (!point) {
            return 0;
          }
          const byLabel = point.cumulativeCycleTimeSecondsByLabel && typeof point.cumulativeCycleTimeSecondsByLabel === "object"
            ? point.cumulativeCycleTimeSecondsByLabel
            : null;
          if (!byLabel) {
            return Number(point.cumulativeCycleTimeSeconds) || 0;
          }
          if (visibleLabelSet.size === 0) {
            return Object.values(byLabel).reduce((sum, value) => sum + (Number(value) || 0), 0);
          }
          let total = 0;
          for (const label of visibleLabelSet) {
            total += Number(byLabel[label]) || 0;
          }
          return total;

      };

      const renderMeta = (data) => {
        const labels = data.labels.length > 0 ? data.labels.join(", ") : "none";
        const activeRange = getSelectedTimeRange(data);
        const visibleLabelSet = getEffectiveVisibleLabels(data.labels);
        const toggleButtons = data.labels.length > 0

          `<span class="chip">Visible window: ${activeRange.label} (${formatSelectedRangeText(activeRange)})</span>`,
          `<span class="chip">Completed cards: ${data.totalCompletedCards}</span>`,
          `<span class="chip">Unfinished in cycle: ${unfinishedCards}</span>`,

          `<span class="chip">Auto-refresh: ${refreshSeconds}s</span>`,

        metaEl.querySelectorAll(".chip-toggle").forEach((buttonEl) => {
          buttonEl.addEventListener("click", async () => {

            if (!label) {
              return;

            const allLabels = Array.isArray(latestData.labels) ? latestData.labels : [];
            const next = new Set(Array.from(getEffectiveVisibleLabels(allLabels)));
            const normalized = label.trim().toLowerCase();
            if (next.has(normalized)) {
              next.delete(normalized);
            } else {
              next.add(normalized);
            }
            if (next.size === 0) {
              next.add(normalized);
            }
            setVisibleLabels(next, allLabels);
            renderMeta(latestData);
            await renderThroughputChart(latestData);
            await renderCycleGauge(latestData);
            await renderCycleArea(latestData);
            await renderCycleAreaByLabel(latestData);
          });

        metaEl.querySelectorAll(".range-toggle").forEach((buttonEl) => {
          buttonEl.addEventListener("click", async () => {
            if (!latestData) {
              return;
            }
            const nextRange = buttonEl.getAttribute("data-range");
            if (!nextRange || !timeRangePresetIds.has(nextRange) || nextRange === selectedTimeRangeId) {
              return;
            }

            const nextUrl = new URL(window.location.href);
            nextUrl.searchParams.set("range", selectedTimeRangeId);
            window.history.replaceState({}, "", nextUrl);
            renderMeta(latestData);
            await renderThroughputChart(latestData);
            await renderCycleGauge(latestData);
            await renderCycleArea(latestData);
            await renderCycleAreaByLabel(latestData);
          });
        });

        const colorMap = getLabelColorMap(data.labels);
        const visibleLabels = Array.from(visibleLabelSet);
        const hasFrozenTarget = getTargetFreezeStartMs(activeRange) !== null;
        const styleLegendItems = [
          "<span class=\"chart-legend-item\"><span class=\"chart-legend-line chart-legend-line-actual\"></span>Actual cumulative</span>",
          "<span class=\"chart-legend-item\"><span class=\"chart-legend-line chart-legend-line-dashed\"></span>Forecast (live EMA)</span>",
        ];
        if (hasFrozenTarget) {

      const renderThroughputChart = async (data) => {
        const containerWidth = throughputChartEl ? throughputChartEl.clientWidth : 0;
        const chartWidth = Math.max(280, Math.min(containerWidth > 0 ? containerWidth - 28 : window.innerWidth - 80, 980));
        const allLabels = normalizeLabels(data.labels);

        const labelColorRange = allLabels.map((label) => labelColorMap.get(label) || "#425466");
        const activeRange = getSelectedTimeRange(data);
        const activeRangeDomain = getTimeRangeDomain(activeRange);
        const normalizedPoints = Array.isArray(data.points)
          ? data.points

              if (!point || !point.at || !point.label) {

              const completed = Number(point.completed);
              const cumulativeCompleted = Number(point.cumulativeCompleted);

        const visibleLabelSet = getEffectiveVisibleLabels(data.labels);

        const goalContext = buildGoalRateContext({

              labels: allLabels,

              referenceNow: new Date(targetFreezeStartMs),

            const fallbackContext = hasPositiveSyntheticRate(historicalContext, allLabels)
              ? historicalContext
              : buildGoalRateContext({

                points: normalizedPoints,
                referenceNow: getReferenceNow(data),

            frozenTargetContext = fallbackContext;
            if (hasPositiveSyntheticRate(frozenTargetContext, allLabels)) {
              persistFrozenTargetContext(storageKey, frozenTargetContext, allLabels);

        }

        const throughputDomain = getThroughputDomainMs(activeRange, chartPoints, getReferenceNow(data));
        const goalAnchorsMs = buildRangeAnchorsMs(throughputDomain.startMs, throughputDomain.endMs);
        const forecastPoints = buildSyntheticSeriesPoints({

          anchorsMs: goalAnchorsMs,
          domainStartMs: throughputDomain.startMs,
          context: goalContext,

        const targetPoints = frozenTargetContext
          ? buildSyntheticSeriesPoints({
            labels: allLabels,
            visibleLabelSet,
            anchorsMs: goalAnchorsMs,
            domainStartMs: throughputDomain.startMs,
            context: frozenTargetContext,
          })
          : [];

        for (const point of chartPoints) {
          const elapsedDays = Math.max(0, (point.atMs - throughputDomain.startMs) / millisecondsPerDay);
          const forecastRate = Math.max(0, Number(goalContext.rateByLabel.get(point.label) || 0));
          const forecastValue = forecastRate * elapsedDays;
          point.forecastCumulative = forecastValue;
          point.forecastDelta = point.cumulativeCompleted - forecastValue;
          point.forecastPacePct = forecastValue > 0 ? (point.cumulativeCompleted / forecastValue) * 100 : null;
          point.forecastSource = goalContext.sourceByLabel.get(point.label) || "ema";

          if (frozenTargetContext) {
            const targetRate = Math.max(0, Number(frozenTargetContext.rateByLabel.get(point.label) || 0));
            const targetValue = targetRate * elapsedDays;
            point.targetCumulative = targetValue;
            point.targetDelta = point.cumulativeCompleted - targetValue;
            point.targetPacePct = targetValue > 0 ? (point.cumulativeCompleted / targetValue) * 100 : null;
            point.targetSource = frozenTargetContext.sourceByLabel.get(point.label) || "ema";

            point.targetSource = "n/a rolling window";

            legend: { orient: "bottom", direction: "horizontal" },
          },
          detail: { field: "label", type: "nominal" },
          order: { field: "at", type: "temporal" },
          tooltip: [
            { field: "at", type: "temporal", title: "Time", format: "%Y-%m-%d %H:%M:%S" },
            { field: "label", type: "nominal", title: "Label" },
            { field: "completed", type: "quantitative", title: "Completed (event)" },
            { field: "cumulativeCompleted", type: "quantitative", title: "Completed (cumulative)" },
            { field: "targetCumulative", type: "quantitative", title: "Target (frozen)", format: ".2f" },
            { field: "targetDelta", type: "quantitative", title: "Delta vs target", format: ".2f" },
            { field: "targetPacePct", type: "quantitative", title: "Pace vs target (%)", format: ".1f" },
            { field: "forecastCumulative", type: "quantitative", title: "Forecast (live)", format: ".2f" },
            { field: "forecastDelta", type: "quantitative", title: "Delta vs forecast", format: ".2f" },
            { field: "forecastPacePct", type: "quantitative", title: "Pace vs forecast (%)", format: ".1f" },
          ],
        };

        const syntheticEncoding = {
          x: {
            field: "at",
            type: "temporal",
            title: "Time",
            axis: { format: "%Y-%m-%d %H:%M", labelAngle: -25 },
            scale: activeRangeDomain ? { domain: activeRangeDomain } : undefined,
          },
          color: {
            field: "label",
            type: "nominal",
            title: "Label",
            scale: allLabels.length > 0 ? { domain: allLabels, range: labelColorRange } : undefined,
            legend: null,
          },
          detail: { field: "label", type: "nominal" },
          order: { field: "at", type: "temporal" },
          tooltip: [
            { field: "at", type: "temporal", title: "Time", format: "%Y-%m-%d %H:%M:%S" },
            { field: "label", type: "nominal", title: "Label" },
            { field: "syntheticCumulative", type: "quantitative", title: "Synthetic cumulative", format: ".2f" },
            { field: "syntheticSource", type: "nominal", title: "Source" },
          ],
        };

        const spec = {
          $schema: "https://vega.github.io/schema/vega-lite/v5.json",
          width: chartWidth,
          height: 420,
          layer: [
            {
              data: { values: targetPoints },
              mark: {
                type: "line",
                interpolate: "linear",
                strokeWidth: 1.7,
                opacity: 0.75,
                strokeDash: [2, 4],
              },
              encoding: {
                ...syntheticEncoding,
                y: { field: "syntheticCumulative", type: "quantitative", title: "Cumulative completed tasks" },
              },
            },
            {
              data: { values: forecastPoints },
              mark: {
                type: "line",
                interpolate: "linear",
                strokeWidth: 1.7,
                opacity: 0.65,
                strokeDash: [8, 5],
              },
              encoding: {
                ...syntheticEncoding,
                y: { field: "syntheticCumulative", type: "quantitative", title: "Cumulative completed tasks" },
              },
            },
            {
              data: { values: chartPoints },
              mark: { type: "line", interpolate: "step-after", strokeWidth: 2.4 },
              encoding: {
                ...sharedEncoding,
                y: { field: "cumulativeCompleted", type: "quantitative", title: "Cumulative completed tasks" },
              },
            },
            {
              data: { values: chartPoints },
              mark: {
                type: "point",
                filled: false,
                strokeWidth: 2.2,
                opacity: 1,
              },
              encoding: {
                ...sharedEncoding,
                y: { field: "cumulativeCompleted", type: "quantitative", title: "Cumulative completed tasks" },
                color: { field: "label", type: "nominal", legend: null },
                shape: { field: "label", type: "nominal", legend: null },
                size: {
                  field: "label",
                  type: "nominal",
                  legend: null,
                  scale: { range: [70, 105, 140, 175, 210] },
                },
              },
            },
          ],
          config: {
            background: "#fffdf8",
            axis: { labelColor: "#1f2a35", titleColor: "#1f2a35", gridColor: "#e6e0cf" },
            legend: { labelColor: "#1f2a35", titleColor: "#1f2a35" },
            view: { stroke: "#d9d4c5" },
          },
        };

        await vegaEmbed("#throughput-chart", spec, { actions: false, renderer: "svg" });

      const renderCycleGauge = async (data) => {
        const activeRange = getSelectedTimeRange(data);
        const filteredCycleCards = getVisibleCycleCards(data, activeRange);
        const currentCycleSeconds = filteredCycleCards.reduce(
          (sum, card) => sum + (Number(card.cycleTimeSeconds) || 0),
          0,
        );
        const unfinishedCards = filteredCycleCards.length;
        const snapshotValues = getVisibleSnapshotCycleSeconds(data, activeRange);
        const athCycleSeconds = Math.max(currentCycleSeconds, ...snapshotValues, 0);
        const progress = athCycleSeconds > 0 ? Math.min(1, Math.max(0, currentCycleSeconds / athCycleSeconds)) : 0;
        const progressDeg = `${(progress * 360).toFixed(2)}deg`;
        const percentText = `${Math.round(progress * 100)}%`;
        const gaugeColor = progress >= 0.85
          ? "#b5432a"
          : progress >= 0.6
            ? "#d38b1f"
            : "#1a8f4c";
        cycleGaugeEl.innerHTML = [
          '<div class="cycle-gauge-wrap">',
          `  <div class="cycle-gauge-ring" style="--progress-deg: ${progressDeg}; --gauge-color: ${gaugeColor}">`,
          '    <div class="cycle-gauge-core">',
          `      <div class="cycle-gauge-value">${percentText}</div>`,
          `      <div class="cycle-gauge-subtle">${formatHours(currentCycleSeconds)}h / ${formatHours(athCycleSeconds)}h ATH</div>`,
          `      <div class="cycle-gauge-subtle">${unfinishedCards} unfinished cards</div>`,
          "    </div>",
          "  </div>",
          "</div>",

        const activeRange = getSelectedTimeRange(data);

        const snapshots = snapshotsRaw
          .map((point) => {

                tooltip: [
                  { field: "at", type: "temporal", title: "Snapshot", format: "%Y-%m-%d %H:%M:%S" },
                  { field: "cumulativeCycleTimeHours", type: "quantitative", title: "Cycle time (h)", format: ".2f" },
                  { field: "unfinishedCards", type: "quantitative", title: "Unfinished cards" },

      const renderCycleAreaByLabel = async (data) => {

        const activeRange = getSelectedTimeRange(data);

            ? point.cumulativeCycleTimeSecondsByLabel
            : {};
          for (const label of allLabels) {

            }
            const valueSeconds = Number(byLabel[label]);

          }
        }

        const spec = {
          $schema: "https://vega.github.io/schema/vega-lite/v5.json",
          width: chartWidth,
          height: 280,
          data: { values: points },
          mark: { type: "line", point: true, strokeWidth: 2.2 },
          encoding: {
            x: {
              field: "at",
              type: "temporal",
              title: "Snapshot time",
              axis: { format: "%m-%d %H:%M", labelAngle: -25 },
              scale: cycleWindowDomain ? { domain: cycleWindowDomain } : undefined,
            },
            y: {
              field: "cumulativeCycleTimeHours",
              type: "quantitative",
              title: "Cumulative cycle time (hours)",
            },
            color: {
              field: "label",
              type: "nominal",
              title: "Label",
              scale: allLabels.length > 0 ? { domain: allLabels } : undefined,
            },
            tooltip: [
              { field: "at", type: "temporal", title: "Snapshot", format: "%Y-%m-%d %H:%M:%S" },

              { field: "cumulativeCycleTimeHours", type: "quantitative", title: "Cycle time (h)", format: ".2f" },
            ],

          config: {

            axis: { labelColor: "#1f2a35", titleColor: "#1f2a35", gridColor: "#e6e0cf" },
            legend: { labelColor: "#1f2a35", titleColor: "#1f2a35" },
            view: { stroke: "#d9d4c5" },
          },
        };

        await vegaEmbed("#cycle-area-by-label", spec, { actions: false, renderer: "svg" });
      };

      const loadAndRender = async () => {
        try {
          const response = await fetch(`${dataUrl}?t=${Date.now()}`, { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const data = await response.json();
          latestData = data;
          renderMeta(data);
          await renderThroughputChart(data);
          await renderCycleGauge(data);
          await renderCycleArea(data);
          await renderCycleAreaByLabel(data);
          errorEl.hidden = true;
          errorEl.textContent = "";
        } catch (error) {
          errorEl.hidden = false;
          errorEl.textContent = `Could not load chart data from ${dataUrl}. ${String(error)}`;
        }
      };

      loadAndRender();
      setInterval(loadAndRender, refreshSeconds * 1000);
    </script>
  </body>
</html>
